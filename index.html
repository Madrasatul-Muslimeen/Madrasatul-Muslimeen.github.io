                      <tr key={di}>
                        <td style={{padding:"10px",borderBottom:"1px solid #f1f5f9",background:dayCellBg,textAlign:"center",borderRight:"1px solid #e2e8f0",verticalAlign:"top",whiteSpace:"nowrap"}}>
                          <div style={{fontWeight:"900",fontSize:"13px",color:isWE?"#92400e":"#1e293b",letterSpacing:"0.06em"}}>{day.slice(0,3).toUpperCase()}</div>
                          <div style={{fontSize:"9px",fontWeight:"600",color:isWE?"#b45309":"#94a3b8",marginTop:"2px",textTransform:"uppercase"}}>{isWE?"Weekend":`Day ${di+1}`}</div>
                        </td>
                        {students.map((_,si)=>{
                          const entries=data[di][si]||[], p=gc(si);
                          return (
                            <td key={si} style={{padding:"7px 8px",borderBottom:"1px solid #f1f5f9",borderLeft:`3px solid ${p.mid}`,background:rowBg,verticalAlign:"top",minWidth:"300px"}}>
                              {entries.map((entry,ei)=>(
                                <div key={ei} className="entry-row" style={{display:"flex",gap:"4px",marginBottom:"4px",alignItems:"center"}}>
                                  {/* entry number badge */}
                                  {entries.length>1&&(
                                    <span style={{fontSize:"9px",fontWeight:"800",color:p.text,background:p.soft,border:`1px solid ${p.mid}`,borderRadius:"4px",padding:"2px 4px",flexShrink:0,lineHeight:1,marginTop:"1px"}}>{ei+1}</span>
                                  )}
                                  <select
                                    value={entry.subject}
                                    onChange={e=>updateEntry(di,si,ei,"subject",e.target.value)}
                                    style={{flex:"0 0 42%",padding:"5px 6px",border:`1.5px solid ${entry.subject?p.main:"#e2e8f0"}`,borderRadius:"6px",fontSize:"11px",fontWeight:entry.subject?"600":"400",background:entry.subject?p.soft:"white",color:entry.subject?p.text:"#9ca3af",cursor:"pointer",minWidth:0}}
                                  >
                                    <option value="">&#x2014; Subject &#x2014;</option>
                                    {sections.map(sec=>{
                                      const opts=subjects.filter(sj=>sj.section===sec);
                                      if(!opts.length) return null;
                                      return (<optgroup key={sec} label={sec}>{opts.map((sj,i2)=>(<option key={sec+i2} value={sj.name}>{sj.name}</option>))}</optgroup>);
                                    })}
                                  </select>
                                  <input
                                    value={entry.topic}
                                    onChange={e=>updateEntry(di,si,ei,"topic",e.target.value)}
                                    placeholder="Topic studied&#x2026;"
                                    style={{flex:1,padding:"5px 7px",border:`1.5px solid ${entry.topic?"#a7f3d0":"#e2e8f0"}`,borderRadius:"6px",fontSize:"11px",background:entry.topic?"#f0fdf4":"white",color:"#1e293b",minWidth:0}}
                                  />
                                  {entries.length>1&&(
                                    <button
                                      className="remove-btn"
                                      onClick={()=>removeEntry(di,si,ei)}
                                      title="Remove this entry"
                                      style={{padding:"3px 6px",background:"#fee2e2",border:"1px solid #fecaca",borderRadius:"5px",color:"#ef4444",fontSize:"12px",fontWeight:"800",cursor:"pointer",flexShrink:0,lineHeight:1,opacity:0.7,transition:"opacity .15s"}}
                                    >&#x00D7;</button>
                                  )}
                                </div>
                              ))}
                              {/* Add subject button */}
                              <button
                                onClick={()=>addEntry(di,si)}
                                style={{padding:"3px 0",background:"transparent",border:`1px dashed ${p.mid}`,borderRadius:"5px",color:p.text,fontSize:"10px",fontWeight:"700",cursor:"pointer",width:"100%",marginTop:"2px",opacity:0.7}}
                                onMouseOver={e=>e.currentTarget.style.opacity=1}
                                onMouseOut={e=>e.currentTarget.style.opacity=0.7}
                              >+ Add subject</button>
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:"10px 18px",background:"#f8fafc",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
              <span style={{fontSize:"12px",color:"#64748b"}}><span style={{fontWeight:"700",color:"#0f172a"}}>{totalEntries}</span> subject entr{totalEntries!==1?"ies":"y"} recorded this week &middot; W{weekNum(weekKey)} &middot; {weekMonth(weekKey)}</span>
              <div style={{display:"flex",gap:"7px"}}>
                <button onClick={openWeekReport}  className="pill" style={{padding:"7px 14px",background:"#4ade80",border:"none",borderRadius:"8px",color:"#052e16",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>&#x1F4CA; Week Report</button>
                <button onClick={openMonthReport} className="pill" style={{padding:"7px 14px",background:"#fbbf24",border:"none",borderRadius:"8px",color:"#451a03",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>&#x1F4C5; Monthly Report</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StudyTracker />);
</script>
</body>
</html>
